services:
  redis:
    container_name: integration-tests-redis
    image: redis:7.2-alpine
    ports:
      - 6381:6379
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 10

  db:
    image: postgres:15.4
    restart: always
    container_name: integration-tests-prisma
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: tests
    command: postgres -c max_connections=500 -c shared_buffers=256MB
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prisma -d tests']
      interval: 2s
      timeout: 2s
      retries: 10

  mailhog:
    container_name: integration-tests-mailhog
    image: mailhog/mailhog:v1.0.1
    ports:
      - '1025:1025'
      - '8025:8025'
