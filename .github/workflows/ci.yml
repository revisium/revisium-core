# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Server CI
permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Fast feedback: lint + typecheck, no database required.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'
      - name: Create test .env
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a #canastro/copy-file-action@master
        with:
          source: '.env.example'
          target: '.env'
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run tsc

  # Matrix: run the jest suite sharded across 2 parallel runners. Each runner
  # is 2 vCPUs so `--maxWorkers=2` stays right, but wall time drops because
  # the two shards execute concurrently.
  test:
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    services:
      postgres:
        image: postgres:15.4
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: tests
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U prisma -d tests"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'
      - name: Create test .env
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a #canastro/copy-file-action@master
        with:
          source: '.env.example'
          target: '.env'
      - run: npm ci
      - name: Apply migrations + seed
        run: |
          npx dotenv-cli -e .env.test -- npm run prisma:migrate:deploy
          npx dotenv-cli -e .env.test -- npm run seed
      - name: Run jest shard ${{ matrix.shard }}/2
        run: >-
          NODE_ENV=test npx jest
          --maxWorkers=2 --forceExit --silent --coverage
          --shard=${{ matrix.shard }}/2
          --coverageDirectory=coverage-shard-${{ matrix.shard }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage-shard-${{ matrix.shard }}/
          retention-days: 1

  # Pull both coverage artifacts, merge into one lcov, run SonarQube.
  sonar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download shard 1 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-shard-1
          path: coverage-shard-1
      - name: Download shard 2 coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-shard-2
          path: coverage-shard-2
      - name: Merge lcov reports
        run: |
          mkdir -p coverage
          if [ -f coverage-shard-1/lcov.info ] && [ -f coverage-shard-2/lcov.info ]; then
            cat coverage-shard-1/lcov.info coverage-shard-2/lcov.info > coverage/lcov.info
          elif [ -f coverage-shard-1/lcov.info ]; then
            cp coverage-shard-1/lcov.info coverage/lcov.info
          elif [ -f coverage-shard-2/lcov.info ]; then
            cp coverage-shard-2/lcov.info coverage/lcov.info
          fi
          ls -la coverage/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@8c71dc039c2dd71d3821e89a2b58ecc7fee6ced9 #SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
