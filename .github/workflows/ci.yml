name: Server CI

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'

permissions:
  contents: read

jobs:
  checks:
    uses: revisium/revisium-actions/.github/workflows/node-build.yml@763f2746000f15842e642130dba3acf09c5d00ac # v0.3.2
    with:
      node_version: 24.11.1
      install_command: |
        npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
        npm rebuild bcrypt sharp @swc/core @prisma/engines prisma
      run_commands: |
        cp .env.example .env
        docker compose -f docker-compose-test.yml -p revisium-core-test up -d --wait
        ./node_modules/.bin/dotenv -e .env.test -- npm run prisma:migrate:deploy
        ./node_modules/.bin/dotenv -e .env.test -- npm run seed
        npm run lint:ci
        npm run tsc
        npm run test:cov

  sonar:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: npm

      - name: Create test .env
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
          npm rebuild bcrypt sharp @swc/core @prisma/engines prisma

      - name: Start test services
        run: docker compose -f docker-compose-test.yml -p revisium-core-test up -d --wait

      - name: Apply migrations and seed
        run: |
          ./node_modules/.bin/dotenv -e .env.test -- npm run prisma:migrate:deploy
          ./node_modules/.bin/dotenv -e .env.test -- npm run seed

      - name: Generate coverage
        run: npm run test:cov

      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
