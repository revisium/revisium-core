# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Server CI
permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Create test .env
        run: cp .env.example .env

      - name: Cache Docker images
        id: docker-images-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/docker-images.tar
          key: docker-images-${{ runner.os }}-${{ hashFiles('docker-compose-test.yml') }}

      - if: steps.docker-images-cache.outputs.cache-hit == 'true'
        name: Load cached Docker images
        run: docker load -i ~/docker-images.tar

      - name: Start test services
        run: docker compose -f docker-compose-test.yml -p revisium-core-test up -d --wait

      - if: steps.docker-images-cache.outputs.cache-hit != 'true'
        name: Save Docker images to cache
        run: |
          docker save \
            postgres:15.4 \
            redis:7.2-alpine \
            mailhog/mailhog:v1.0.1 \
            -o ~/docker-images.tar

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
          npm rebuild bcrypt sharp @swc/core @prisma/engines prisma

      - name: Restore jest cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .jest-cache
          key: jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            jest-cache-${{ runner.os }}-

      - run: npm run lint:ci

      - run: npm run tsc

      - name: Apply migrations + seed
        run: |
          npx dotenv-cli -e .env.test -- npm run prisma:migrate:deploy
          npx dotenv-cli -e .env.test -- npm run seed
      - run: npm run test:cov

      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@8c71dc039c2dd71d3821e89a2b58ecc7fee6ced9 # SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
