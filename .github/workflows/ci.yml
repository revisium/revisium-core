# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Server CI
permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    services:
      postgres:
        image: postgres:15.4
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: tests
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U prisma -d tests"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Create test .env
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a #canastro/copy-file-action@master
        with:
          source: '.env.example'
          target: '.env'

      - run: npm ci

      - name: Raise pg max_connections (restart service)
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U prisma -d tests -c "ALTER SYSTEM SET max_connections = 500;"
          docker restart ${{ job.services.postgres.id }}
          for _ in $(seq 1 60); do
            if docker exec ${{ job.services.postgres.id }} pg_isready -U prisma -d tests; then
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready within 60s after restart" >&2
          exit 1

      - name: Restore jest cache
        uses: actions/cache@v4
        with:
          path: .jest-cache
          key: jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            jest-cache-${{ runner.os }}-

      - run: npm run lint:ci

      - run: npm run tsc

      - name: Apply migrations + seed
        run: |
          npx dotenv-cli -e .env.test -- npm run prisma:migrate:deploy
          npx dotenv-cli -e .env.test -- npm run seed
      - run: npm run test:cov

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@8c71dc039c2dd71d3821e89a2b58ecc7fee6ced9 #SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
