name: Server CI

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
          npm rebuild bcrypt sharp @swc/core @prisma/engines prisma

      - run: npm run lint:ci

  tsc:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1
          cache: 'npm'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
          npm rebuild bcrypt sharp @swc/core @prisma/engines prisma

      - run: npm run tsc

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1

      - name: Create test .env
        run: cp .env.example .env

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit --no-fund
          npm rebuild bcrypt sharp @swc/core @prisma/engines prisma

      - name: Restore Jest cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .jest-cache
          key: jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ matrix.shard }}-${{ github.sha }}
          restore-keys: |
            jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ matrix.shard }}-
            jest-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            jest-cache-${{ runner.os }}-

      - name: Start test services
        run: docker compose -f docker-compose-test.yml -p revisium-core-test up -d --wait

      - name: Apply migrations + seed
        run: |
          ./node_modules/.bin/dotenv -e .env.test -- npm run prisma:migrate:deploy
          ./node_modules/.bin/dotenv -e .env.test -- npm run seed

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: >-
          ./node_modules/.bin/dotenv -e .env.test --
          ./node_modules/.bin/jest
          --maxWorkers=4
          --forceExit
          --silent
          --coverage
          --coverageDirectory=coverage/shard-${{ matrix.shard }}
          --shard=${{ matrix.shard }}/4

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage/shard-${{ matrix.shard }}/lcov.info
          retention-days: 7

      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose-test.yml -p revisium-core-test down --volumes

  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: test

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-shard-*
          path: coverage-tmp

      - name: Stage coverage for Sonar
        run: |
          mkdir -p coverage
          for shard in 1 2 3 4; do
            if [ -f "coverage-tmp/coverage-shard-${shard}/lcov.info" ]; then
              mkdir -p "coverage/shard-${shard}"
              cp "coverage-tmp/coverage-shard-${shard}/lcov.info" "coverage/shard-${shard}/lcov.info"
            fi
          done

      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  checks:
    runs-on: ubuntu-latest
    permissions: {}
    needs: [lint, tsc, test]
    if: always()

    defaults:
      run:
        shell: bash

    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] \
            || [ "${{ needs.tsc.result }}" != "success" ] \
            || [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs succeeded."
